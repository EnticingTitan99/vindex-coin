name: Vindex CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: false

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=0 \
            --quiet \
            src/cryptonote_config.h \
            src/version.h

  build-linux:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Cache apt packages
        uses: actions/cache@v4.2.3
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-vindex-deps-v2

      - name: Cache ccache
        uses: actions/cache@v4.2.3
        with:
          path: ~/.ccache
          key: ccache-ci-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-ci-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config ccache git \
            libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libunwind8-dev liblzma-dev \
            libreadline-dev libexpat1-dev \
            libboost-chrono-dev libboost-date-time-dev \
            libboost-filesystem-dev libboost-locale-dev \
            libboost-program-options-dev libboost-regex-dev \
            libboost-serialization-dev libboost-system-dev \
            libboost-thread-dev python3

      - name: Initialise submodules
        run: git submodule update --init --recursive --jobs 4

      - name: Configure CMake (Release)
        run: |
          mkdir -p build/release
          cd build/release
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DUSE_DEVICE_TREZOR=OFF \
            -DMANUAL_SUBMODULES=1 \
            -DBUILD_SHARED_LIBS=OFF \
            -DSTACK_TRACE=OFF \
            ../..

      - name: Build vindexd
        run: |
          cd build/release
          make -j$(nproc) daemon

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: vindexd-linux-amd64
          path: build/release/bin/vindexd
          retention-days: 7
