name: Vindex CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --error-exitcode=0 \
            --quiet \
            src/cryptonote_config.h \
            src/version.h

  build-linux:
    name: Build (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: recursive

      - name: Cache apt packages
        uses: actions/cache@v4.2.3
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-vindex-deps

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libunwind8-dev liblzma-dev \
            libreadline-dev libexpat1-dev \
            libboost-chrono-dev libboost-date-time-dev \
            libboost-filesystem-dev libboost-locale-dev \
            libboost-program-options-dev libboost-regex-dev \
            libboost-serialization-dev libboost-system-dev \
            libboost-thread-dev python3 ccache git

      - name: Configure cmake
        run: |
          mkdir -p build/release
          cd build/release
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTS=OFF \
                -DUSE_DEVICE_TREZOR=OFF \
                ../..

      - name: Build vindexd
        run: |
          cd build/release
          make -j$(nproc) daemon

      - name: Upload daemon artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: vindexd-linux-amd64
          path: build/release/bin/vindexd
          retention-days: 7
