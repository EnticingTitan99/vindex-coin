name: Build Linux (vindexd)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  submodule-check:
    name: Validate Submodules
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify required submodules are populated
        run: |
          MISSING=()
          for dir in external/rapidjson external/randomx external/gtest; do
            if [ ! -f "$dir/CMakeLists.txt" ] && [ ! -f "$dir/include/rapidjson/rapidjson.h" ] && [ -z "$(ls -A $dir 2>/dev/null)" ]; then
              MISSING+=("$dir")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::The following submodules are empty or missing:"
            for m in "${MISSING[@]}"; do echo "  - $m"; done
            echo ""
            echo "Fix locally with:"
            echo "  git submodule update --init --force"
            exit 1
          fi
          echo "All required submodules are populated."

  build-linux:
    name: Build vindexd + vindex-wallet-rpc (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    needs: submodule-check
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-vindex-deps-v2

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config ccache git \
            libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libunwind8-dev liblzma-dev \
            libreadline-dev libexpat1-dev \
            libboost-chrono-dev libboost-date-time-dev \
            libboost-filesystem-dev libboost-locale-dev \
            libboost-program-options-dev libboost-regex-dev \
            libboost-serialization-dev libboost-system-dev \
            libboost-thread-dev python3

      - name: Initialise submodules (safety net)
        run: git submodule update --init --force

      - name: Configure CMake (Release)
        run: |
          mkdir -p build/Linux/main/release
          cd build/Linux/main/release
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DUSE_DEVICE_TREZOR=OFF \
            ../../../..

      - name: Build vindexd and vindex-wallet-rpc
        run: |
          cd build/Linux/main/release
          make -j$(nproc) daemon wallet_rpc

      - name: Confirm binaries exist
        run: |
          for bin in vindexd vindex-wallet-rpc; do
            if [ ! -f "build/Linux/main/release/bin/$bin" ]; then
              echo "::error::$bin binary not found after build!"
              exit 1
            fi
            echo "Build successful: $(build/Linux/main/release/bin/$bin --version 2>/dev/null || echo "$bin OK")"
          done

      - name: Upload vindexd artifact
        uses: actions/upload-artifact@v4
        with:
          name: vindexd-linux-amd64-${{ github.sha }}
          path: build/Linux/main/release/bin/vindexd
          retention-days: 14

      - name: Upload vindex-wallet-rpc artifact
        uses: actions/upload-artifact@v4
        with:
          name: vindex-wallet-rpc-linux-amd64-${{ github.sha }}
          path: build/Linux/main/release/bin/vindex-wallet-rpc
          retention-days: 14
