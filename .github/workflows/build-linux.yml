name: Build Linux (vindexd)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build vindexd + vindex-wallet-rpc (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout (no automatic submodules)
        uses: actions/checkout@v4.2.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Cache apt packages
        uses: actions/cache@v4.2.3
        with:
          path: /var/cache/apt
          key: apt-${{ runner.os }}-vindex-deps-v2

      - name: Cache ccache
        uses: actions/cache@v4.2.3
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config ccache git \
            libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libunwind8-dev liblzma-dev \
            libreadline-dev libexpat1-dev \
            libboost-chrono-dev libboost-date-time-dev \
            libboost-filesystem-dev libboost-locale-dev \
            libboost-program-options-dev libboost-regex-dev \
            libboost-serialization-dev libboost-system-dev \
            libboost-thread-dev python3

      - name: Initialise submodules
        run: git submodule update --init --recursive --jobs 4

      - name: Configure CMake (Release)
        run: |
          mkdir -p build/Linux/main/release
          cd build/Linux/main/release
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DUSE_DEVICE_TREZOR=OFF \
            -DMANUAL_SUBMODULES=1 \
            -DBUILD_SHARED_LIBS=OFF \
            -DSTACK_TRACE=OFF \
            ../../../..

      - name: Build vindexd and vindex-wallet-rpc
        run: |
          cd build/Linux/main/release
          make -j$(nproc) daemon wallet_rpc

      - name: Confirm binaries exist
        run: |
          for bin in vindexd vindex-wallet-rpc; do
            if [ ! -f "build/Linux/main/release/bin/$bin" ]; then
              echo "::error::$bin binary not found after build!"
              exit 1
            fi
            echo "Build successful: $(build/Linux/main/release/bin/$bin --version 2>/dev/null || echo "$bin OK")"
          done

      - name: Upload vindexd artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: vindexd-linux-amd64-${{ github.sha }}
          path: build/Linux/main/release/bin/vindexd
          retention-days: 14

      - name: Upload vindex-wallet-rpc artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: vindex-wallet-rpc-linux-amd64-${{ github.sha }}
          path: build/Linux/main/release/bin/vindex-wallet-rpc
          retention-days: 14
