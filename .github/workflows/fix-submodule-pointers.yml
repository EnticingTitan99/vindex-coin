name: Fix Submodule Pointers (one-shot)
# This workflow commits the missing gitlink tree entries for
# rapidjson, randomx and gtest then deletes itself.
# Run once via Actions > Fix Submodule Pointers > Run workflow.

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix-submodules:
    name: Register missing submodule tree entries
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4.2.2
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Register submodule URLs
        run: |
          # Ensure .gitmodules entries are registered with git
          git submodule init

      - name: Clone submodules at pinned Monero-upstream SHAs
        run: |
          # rapidjson
          git submodule update --init external/rapidjson
          cd external/rapidjson
          git checkout 129d19ba7f496df5e33658527a7158c79b99c21c
          cd ../..

          # randomx
          git submodule update --init external/randomx
          cd external/randomx
          git checkout 6c4340ba4561aec9a3611c1aedf9931239777fb3
          cd ../..

          # gtest
          git submodule update --init external/gtest
          cd external/gtest
          git checkout b514bdc898e2951020cbdca1304b75f5950d1f59
          cd ../..

      - name: Stage and commit gitlinks
        run: |
          git add external/rapidjson
          git add external/randomx
          git add external/gtest
          git status
          git diff --cached --name-only
          git commit -m "chore: register missing submodule gitlinks (rapidjson, randomx, gtest)

Pins to same SHAs used by monero-project/monero master:
  external/rapidjson -> 129d19ba7f496df5e33658527a7158c79b99c21c
  external/randomx   -> 6c4340ba4561aec9a3611c1aedf9931239777fb3
  external/gtest     -> b514bdc898e2951020cbdca1304b75f5950d1f59

Fixes: git clone --recursive and CI checkout failing with empty dirs."

      - name: Delete this workflow file
        run: |
          git rm .github/workflows/fix-submodule-pointers.yml
          git commit -m "chore: remove one-shot fix-submodule-pointers workflow"

      - name: Push
        run: git push origin main
