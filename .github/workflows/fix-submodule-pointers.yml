name: Fix Submodule Pointers (one-shot)
# Commits the missing 160000 gitlink tree entries for rapidjson,
# randomx and gtest, then deletes itself.
# Run once via Actions > Fix Submodule Pointers > Run workflow.

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fix-submodules:
    name: Register missing submodule tree entries
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4.2.2
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone submodules directly at pinned SHAs
        run: |
          # No gitlink tree entries exist yet so git submodule update
          # cannot find the paths. Clone directly instead.

          git clone https://github.com/Tencent/rapidjson external/rapidjson
          git -C external/rapidjson checkout 129d19ba7f496df5e33658527a7158c79b99c21c

          git clone https://github.com/tevador/RandomX external/randomx
          git -C external/randomx checkout 6c4340ba4561aec9a3611c1aedf9931239777fb3

          git clone https://github.com/google/googletest external/gtest
          git -C external/gtest checkout b514bdc898e2951020cbdca1304b75f5950d1f59

      - name: Stage gitlinks and commit
        run: |
          git add external/rapidjson external/randomx external/gtest
          git diff --cached --name-only
          git commit -m "chore: register missing submodule gitlinks (rapidjson, randomx, gtest)"

      - name: Remove this workflow and push
        run: |
          git rm .github/workflows/fix-submodule-pointers.yml
          git commit -m "chore: remove one-shot fix-submodule-pointers workflow"
          git push origin main
