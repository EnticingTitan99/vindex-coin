name: Vindex Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v0.1.0-testnet)'
        required: true
        default: 'v0.1.0-testnet'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build Release Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux-amd64
    runs-on: ${{ matrix.os }}

    # Resolve the effective tag: from push event or manual input
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          submodules: false
          fetch-depth: 0

      - name: Cache ccache
        uses: actions/cache@v4.2.3
        with:
          path: ~/.ccache
          key: ccache-release-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-release-${{ runner.os }}-

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config ccache git \
            libssl-dev libzmq3-dev libunbound-dev \
            libsodium-dev libunwind8-dev liblzma-dev \
            libreadline-dev libexpat1-dev \
            libboost-chrono-dev libboost-date-time-dev \
            libboost-filesystem-dev libboost-locale-dev \
            libboost-program-options-dev libboost-regex-dev \
            libboost-serialization-dev libboost-system-dev \
            libboost-thread-dev python3

      - name: Populate missing submodules
        run: |
          clone_at() {
            local dir=$1 url=$2 sha=$3
            if [ ! -f "$dir/CMakeLists.txt" ]; then
              rm -rf "$dir"
              git clone "$url" "$dir"
              git -C "$dir" checkout "$sha"
            fi
            echo "$dir OK: $(git -C $dir rev-parse HEAD)"
          }
          clone_at external/randomx  https://github.com/tevador/RandomX         6c4340ba4561aec9a3611c1aedf9931239777fb3
          clone_at external/rapidjson https://github.com/Tencent/rapidjson       129d19ba7f496df5e33658527a7158c79b99c21c
          clone_at external/gtest     https://github.com/google/googletest       b514bdc898e2951020cbdca1304b75f5950d1f59
          clone_at external/supercop  https://github.com/monero-project/supercop e887b2fb4bfcfcc454b2005472ad1df6f2191f52

      - name: Configure CMake (Release)
        run: |
          mkdir -p build/Linux/main/release
          cd build/Linux/main/release
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_TESTS=OFF \
            -DUSE_DEVICE_TREZOR=OFF \
            -DMANUAL_SUBMODULES=1 \
            -DBUILD_SHARED_LIBS=OFF \
            -DSTACK_TRACE=OFF \
            ../../../..

      - name: Build vindexd and vindex-wallet-rpc
        run: |
          cd build/Linux/main/release
          make -j$(nproc) daemon wallet_rpc

      - name: Confirm binaries exist
        run: |
          for bin in vindexd vindex-wallet-rpc; do
            if [ ! -f "build/Linux/main/release/bin/$bin" ]; then
              echo "::error::$bin binary not found after build!"
              exit 1
            fi
            echo "$(build/Linux/main/release/bin/$bin --version 2>/dev/null || echo "$bin OK")"
          done

      - name: Package binaries
        run: |
          mkdir -p dist
          cp build/Linux/main/release/bin/vindexd dist/
          cp build/Linux/main/release/bin/vindex-wallet-rpc dist/
          tar -czvf vindex-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Vindex ${{ env.RELEASE_TAG }}
          files: vindex-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, 'testnet') || contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'beta') }}
          body: |
            ## Vindex ${{ env.RELEASE_TAG }}
            *Libertatis Vindex* — Champion of Liberty

            Forked from Monero v0.18.x (Fluorine Fermi). RandomX PoW, ring signatures, RingCT, stealth addresses.

            ### Binaries
            | File | Platform |
            |------|----------|
            | `vindex-${{ env.RELEASE_TAG }}-linux-amd64.tar.gz` | Linux x86_64 |

            ### Network Ports
            | Network    | P2P   | RPC   | ZMQ   |
            |------------|-------|-------|-------|
            | Mainnet    | 28080 | 28081 | 28082 |
            | Testnet    | 38080 | 38081 | 38082 |
            | Stagenet   | 48080 | 48081 | 48082 |
            | Wallet RPC | —     | 18083 | —     |

            ### Network ID
            `VDXNET LIBERTATI` (mainnet) · `VDXNET LIBERTATJ` (testnet)

            ### Verify
            ```bash
            tar -xzf vindex-${{ env.RELEASE_TAG }}-linux-amd64.tar.gz
            ./vindexd --version
            ```
